services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nt_coverage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nt_coverage"]
      interval: 5s
      timeout: 5s
      retries: 5

  init:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: postgres
    volumes:
      - ../backups:/backups:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ -z "$${RESTORE_FILE:-}" ]; then
          echo "No RESTORE_FILE set — skipping restore."
        elif [ ! -f "/backups/$$RESTORE_FILE" ]; then
          echo "File /backups/$$RESTORE_FILE not found — skipping restore."
        else
          echo "Restoring from /backups/$$RESTORE_FILE ..."
          psql -h postgres -U postgres -d postgres -c \
            "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='nt_coverage' AND pid <> pg_backend_pid();" || true
          psql -h postgres -U postgres -d postgres -c "DROP DATABASE IF EXISTS nt_coverage;"
          psql -h postgres -U postgres -d postgres -c "CREATE DATABASE nt_coverage;"
          pg_restore --clean --if-exists --verbose -h postgres -U postgres -d nt_coverage "/backups/$$RESTORE_FILE"
          echo "Restore complete."
        fi
        echo "Ensuring bible_db exists..."
        psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'bible_db'" | grep -q 1 || \
          psql -h postgres -U postgres -c "CREATE DATABASE bible_db;"
        echo "bible_db ensured."

  app:
    build: ../backend
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 10.76.19.15
    environment:
      DATABASE_URL: "jdbc:postgresql://postgres:5432/nt_coverage"
      DATABASE_USER: "postgres"
      DATABASE_PASSWORD: "postgres"
      USE_NTVMR: "true"
      NTVMR_DELAY_MS: "50"
      ENABLE_INGESTION: "true"
      ENABLE_MANUSCRIPT_INGESTION: "false"
      ENABLE_PATRISTIC_INGESTION: "false"
      ENABLE_COUNCIL_INGESTION: "false"
      INGESTION_SKIP_IF_POPULATED: "true"
      INGESTION_TIMEOUT_MINUTES: "15"
      SOURCE_CACHE_DIR: "/data/source-cache"
      # DEV: load full catalog from NTVMR (140+ papyri + uncials) instead of seed JSON (57)
      LOAD_MANUSCRIPTS_FROM_NTVMR: "true"
      # ══════════════════════════════════════════════════════════════
      # OpenAI API — 3-Tier LLM Routing
      # ══════════════════════════════════════════════════════════════
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_LOW_MODEL: "gpt-4.1-mini"
      OPENAI_MEDIUM_MODEL: "gpt-5.4"
      OPENAI_HIGH_MODEL: "gpt-5.4"
      # Per-tier concurrency
      LLM_LOW_CONCURRENCY: "80"
      LLM_MEDIUM_CONCURRENCY: "40"
      LLM_HIGH_CONCURRENCY: "15"
      # Per-tier batch sizes
      LLM_LOW_BATCH_SIZE: "150"
      LLM_MEDIUM_BATCH_SIZE: "80"
      LLM_HIGH_BATCH_SIZE: "20"
      # Per-tier timeouts (ms)
      LLM_LOW_TIMEOUT_MS: "30000"
      LLM_MEDIUM_TIMEOUT_MS: "60000"
      LLM_HIGH_TIMEOUT_MS: "120000"
      # Generic delays
      LLM_ALIGNMENT_DELAY_MS: "50"
      LLM_ENRICHMENT_DELAY_MS: "100"
      LLM_CONCURRENCY: "15"
      ENABLE_BIO_SUMMARIZATION: "true"
      ENABLE_BIO_TRANSLATION: "true"
      ENABLE_DATING_ENRICHMENT: "true"
      GOOGLE_CLIENT_ID: "789788292255-7skrv2ufj7ev7o4jbsicp3kdopo6ah2s.apps.googleusercontent.com"
      JWT_SECRET: "${JWT_SECRET:-manuscriptum-dev-secret-change-in-production}"
      SERVICE_CLIENT_ID: "${SERVICE_CLIENT_ID:-run-llm}"
      SERVICE_CLIENT_SECRET: "${SERVICE_CLIENT_SECRET:-}"
      BIBLE_DATABASE_URL: "jdbc:postgresql://postgres:5432/bible_db"
      BIBLE_DATABASE_USER: "postgres"
      BIBLE_DATABASE_PASSWORD: "postgres"
      BIBLE_DATA_DIR: "/data/bible-data"
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    depends_on:
      init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    volumes:
      - source-cache:/data/source-cache
      - bible-data:/data/bible-data

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: manuscriptum-atlas-kafka
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: "http://app:8080"
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: "789788292255-7skrv2ufj7ev7o4jbsicp3kdopo6ah2s.apps.googleusercontent.com"
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: "http://app:8080"
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: "789788292255-7skrv2ufj7ev7o4jbsicp3kdopo6ah2s.apps.googleusercontent.com"
    depends_on:
      app:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      app:
        condition: service_started

  loki:
    image: grafana/loki:3.4.2
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.4.2
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.5.2
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
      - loki

volumes:
  pgdata:
  source-cache:
  bible-data:
  kafka-data:
  prometheus-data:
  loki-data:
  grafana-data:
