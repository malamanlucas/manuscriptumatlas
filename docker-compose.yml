services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nt_coverage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nt_coverage"]
      interval: 5s
      timeout: 5s
      retries: 5

  init:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./backups:/backups:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ -z "$${RESTORE_FILE:-}" ]; then
          echo "No RESTORE_FILE set — skipping restore."
          exit 0
        fi
        if [ ! -f "/backups/$$RESTORE_FILE" ]; then
          echo "File /backups/$$RESTORE_FILE not found — skipping restore."
          exit 0
        fi
        echo "Restoring from /backups/$$RESTORE_FILE ..."
        psql -h postgres -U postgres -d postgres -c \
          "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='nt_coverage' AND pid <> pg_backend_pid();" || true
        psql -h postgres -U postgres -d postgres -c "DROP DATABASE IF EXISTS nt_coverage;"
        psql -h postgres -U postgres -d postgres -c "CREATE DATABASE nt_coverage;"
        pg_restore --clean --if-exists --verbose -h postgres -U postgres -d nt_coverage "/backups/$$RESTORE_FILE"
        echo "Restore complete."

  app:
    build: .
    ports:
      - "8080:8080"
    dns:
      - 10.76.19.15
      - 10.241.240.41
      - 8.8.8.8
    environment:
      DATABASE_URL: "jdbc:postgresql://postgres:5432/nt_coverage"
      DATABASE_USER: "postgres"
      DATABASE_PASSWORD: "postgres"
      USE_NTVMR: "true"
      NTVMR_DELAY_MS: "50"
      ENABLE_INGESTION: "true"
      ENABLE_MANUSCRIPT_INGESTION: "false"
      ENABLE_PATRISTIC_INGESTION: "true"
      ENABLE_COUNCIL_INGESTION: "false"
      INGESTION_SKIP_IF_POPULATED: "false"
      INGESTION_TIMEOUT_MINUTES: "15"
      SOURCE_CACHE_DIR: "/data/source-cache"
      # DEV: load full catalog from NTVMR (140+ papyri + uncials) instead of seed JSON (57)
      LOAD_MANUSCRIPTS_FROM_NTVMR: "true"
      OPENAI_API_KEY: "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"
      OPENAI_MODEL: "gpt-4o-mini"
      OPENAI_TIMEOUT_MS: "12000"
      ENABLE_BIO_SUMMARIZATION: "true"
      ENABLE_BIO_TRANSLATION: "true"
      ENABLE_DATING_ENRICHMENT: "true"
      GOOGLE_CLIENT_ID: "789788292255-7skrv2ufj7ev7o4jbsicp3kdopo6ah2s.apps.googleusercontent.com"
      JWT_SECRET: "${JWT_SECRET:-manuscriptum-dev-secret-change-in-production}"
      NEW_RELIC_ENVIRONMENT: "dev"
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - source-cache:/data/source-cache

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: "http://app:8080"
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: "789788292255-7skrv2ufj7ev7o4jbsicp3kdopo6ah2s.apps.googleusercontent.com"
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: "http://app:8080"
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: "789788292255-7skrv2ufj7ev7o4jbsicp3kdopo6ah2s.apps.googleusercontent.com"
      NEW_RELIC_APP_NAME: "manuscriptum-atlas-frontend-dev"
    depends_on:
      - app

volumes:
  pgdata:
  source-cache:
